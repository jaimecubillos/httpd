apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpd
  labels:
    app: httpd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: httpd
  template:
    metadata:
      labels:
        app: httpd
    spec:
      containers:
        - name: httpd
          image: httpd
          ports:
            - containerPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: lb-httpd
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app: httpd
  ports:
    - protocol: TCP
      port: 9000
      targetPort: 9000